name: student
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  provider: ^6.0.5
  http: ^1.2.1
  mime: ^2.0.0
  video_player: ^2.9.2
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.2
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  path_provider: ^2.1.5
  share_plus: ^11.0.0
  open_filex: ^4.7.0
  pdf: ^3.11.3
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  signalr_netcore: ^1.4.4
  crypto: ^3.0.3
  flutter_web_auth_2: ^4.1.0
  geolocator: ^14.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/logo/course_intellect2.png
    - assets/fonts/ArialUnicode.ttf
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/course_intellect2.png
  adaptive_icon_background: "#F7F7F5"
  adaptive_icon_foreground: assets/logo/course_intellect2.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F7F7F5"
  image: assets/logo/course_intellect2.png
  android: true
  ios: true
  android_12:
    color: "#F7F7F5"
    image: assets/logo/course_intellect2.png
